<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>倉儲管理系統</title>
<style>
*{box-sizing:border-box}
body{font-family:Arial;margin:20px;background:#f5f5f5}
.card{background:#fff;padding:15px;border-radius:8px;margin-bottom:15px}
input,button{padding:8px;margin:4px;max-width:100%}
table{width:100%;border-collapse:collapse;min-width:680px}
th,td{border:1px solid #ccc;padding:8px;text-align:center}
th{background:#eee}
.table-wrap{overflow-x:auto}
.status{margin:8px 0 0;color:#666;font-size:13px}
@media (max-width:768px){
 body{margin:10px}
 input,button{width:100%;margin:6px 0}
 .card{padding:12px}
 h2,h3{margin:8px 0}
}
</style>
</head>
<body>

<div class="card">
<h2>倉儲管理系統 V3</h2><button onclick="adminLogin()">管理員登入</button><div id="adminArea" style="display:none">

<h3>新增品項</h3>
<input id="item" placeholder="品項名稱">
<input id="loc" placeholder="倉庫位置">
<input id="stock" type="number" placeholder="初始庫存">
<button onclick="addItem()">新增品項</button>


<h3>進貨作業</h3>
<input id="inItem" placeholder="品項名稱">
<input id="inQty" type="number" placeholder="進貨數量">
<button onclick="addStock()">確認進貨</button>
</div><h3>領用作業</h3>
<input id="useItem" placeholder="品項名稱">
<input id="user" placeholder="領用人">
<input id="qty" type="number" placeholder="領用數量">
<button onclick="useStock()">確認領用</button>
<div id="syncStatus" class="status"></div>
</div>

<div class="card">
<h3>目前庫存</h3>
<div class="table-wrap">
<table>
<thead>
<tr><th>品項</th><th>倉庫位置</th><th>前期存貨</th><th>累計進貨</th><th>累計領用</th><th>目前庫存</th><th>操作</th></tr>
</thead>
<tbody id="stockTable"></tbody>
</table>
</div>
</div>

<div class="card">
<h3>領用歷史紀錄</h3>
<div class="table-wrap">
<table>
<thead>
<tr><th>時間</th><th>品項</th><th>領用人</th><th>領用數量</th><th>操作</th></tr>
</thead>
<tbody id="logTable"></tbody>
</table>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
let isAdmin=false;
let remoteDb=null;
let remoteRef=null;
const syncStatus=document.getElementById('syncStatus');

const firebaseConfig = {
  apiKey: "",
  authDomain: "",
  databaseURL: "",
  projectId: "",
  storageBucket: "",
  messagingSenderId: "",
  appId: ""
};

const enableCloudSync = Object.values(firebaseConfig).every(Boolean);

function adminLogin(){
 const p=prompt('請輸入管理密碼');
 if(p==='8787'){
   isAdmin=true;
   document.getElementById('adminArea').style.display='block';
   render();
 }else{
   alert('密碼錯誤');
 }
}

let inventory = [];
let logs = [];

function readLocal(){
 inventory = JSON.parse(localStorage.getItem('inventory')||'[]');
 logs = JSON.parse(localStorage.getItem('logs')||'[]');
}

function save(){
 if(enableCloudSync){
   if(!remoteRef){ return; }
   remoteRef.set({
     inventory,
     logs,
     updatedAt: Date.now()
   });
   return;
 }
 localStorage.setItem('inventory',JSON.stringify(inventory));
 localStorage.setItem('logs',JSON.stringify(logs));
}


function addStock(){
 if(!isAdmin){ alert('請先登入管理員'); return; }
 const item=document.getElementById('inItem').value.trim();
 const qty=parseInt(document.getElementById('inQty').value||0);
 const row=inventory.find(x=>x.item===item);
 if(!row){ alert('找不到品項'); return; }
 if(qty<=0){ alert('請輸入正確數量'); return; }
 row.inStock=(row.inStock||0)+qty; row.remain += qty;
 save();
 render();
}

function addItem(){
 if(!isAdmin){ alert("請先登入管理員"); return; }
 const item=document.getElementById('item').value.trim();
 const loc=document.getElementById('loc').value.trim();
 const stock=parseInt(document.getElementById('stock').value||0);

 if(!item || !loc || stock<=0){
   alert('請輸入完整資料');
   return;
 }

 inventory.push({item,loc,startStock:stock,inStock:0,usedStock:0,remain:stock});
 save();
 render();
}

function useStock(){
 const item=document.getElementById('useItem').value.trim();
 const user=document.getElementById('user').value.trim();
 const qty=parseInt(document.getElementById('qty').value||0);

 const row=inventory.find(x=>x.item===item);

 if(!row){ alert('找不到品項'); return; }
 if(qty<=0 || qty>row.remain){ alert('庫存不足'); return; }

 row.usedStock=(row.usedStock||0)+qty; row.remain -= qty;

 logs.unshift({
   time:new Date().toLocaleString(),
   item:item,
   user:user,
   qty:qty
 });

 save();
 render();
}


function deleteItem(i){
 if(!isAdmin){alert("請先登入管理員");return;} if(confirm('確定刪除此品項？')){
   inventory.splice(i,1);
   save();
   render();
 }
}

function deleteLog(i){
 if(!isAdmin){alert("請先登入管理員");return;} if(confirm('確定刪除此紀錄？')){
   logs.splice(i,1);
   save();
   render();
 }
}


function render(){
 document.getElementById('stockTable').innerHTML =
 inventory.map((r,i)=>`<tr>
<td>${r.item}</td>
<td>${r.loc}</td>
<td>${r.startStock||0}</td>
<td>${r.inStock||0}</td>
<td>${r.usedStock||0}</td>
<td>${r.remain}</td>
<td>${isAdmin?`<button onclick="deleteItem(${i})">🗑️刪除</button>`:""}</td>
</tr>`).join('');

 document.getElementById('logTable').innerHTML =
 logs.map((r,i)=>`<tr><td>${r.time}</td><td>${r.item}</td><td>${r.user}</td><td>${r.qty}</td><td>${isAdmin?`<button onclick="deleteLog(${i})">🗑️刪除</button>`:""}</td></tr>`).join('');
}

function initSync(){
 if(!enableCloudSync){
   readLocal();
   syncStatus.textContent='目前為本機模式（僅此裝置）；填入 Firebase 設定即可手機/電腦同步。';
   render();
   return;
 }
 firebase.initializeApp(firebaseConfig);
 remoteDb = firebase.database();
 remoteRef = remoteDb.ref('warehouse');
 syncStatus.textContent='雲端同步中：手機與電腦會自動更新。';
 remoteRef.on('value', (snapshot) => {
   const data = snapshot.val() || {};
   inventory = Array.isArray(data.inventory) ? data.inventory : [];
   logs = Array.isArray(data.logs) ? data.logs : [];
   render();
 });
}

initSync();
</script>

</body>
</html>
